<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- Gradient bleu moderne -->
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#60a5fa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2563eb;stop-opacity:1" />
    </linearGradient>
    
    <!-- Ombre pour les cercles -->
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="4"/>
      <feOffset dx="0" dy="2" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.2"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background avec coins arrondis (style iOS) -->
  <rect width="512" height="512" rx="110" fill="url(#blueGrad)"/>
  
  <!-- Pattern de grille subtile en arrière-plan -->
  <g opacity="0.1">
    <line x1="0" y1="128" x2="512" y2="128" stroke="white" stroke-width="1"/>
    <line x1="0" y1="256" x2="512" y2="256" stroke="white" stroke-width="1"/>
    <line x1="0" y1="384" x2="512" y2="384" stroke="white" stroke-width="1"/>
    <line x1="128" y1="0" x2="128" y2="512" stroke="white" stroke-width="1"/>
    <line x1="256" y1="0" x2="256" y2="512" stroke="white" stroke-width="1"/>
    <line x1="384" y1="0" x2="384" y2="512" stroke="white" stroke-width="1"/>
  </g>
  
  <!-- Icône de réseau/connexion SIRH (triangle de 3 nœuds) -->
  <g filter="url(#shadow)">
    <!-- Lignes de connexion (plus épaisses et douces) -->
    <line x1="150" y1="310" x2="256" y2="390" stroke="white" stroke-width="28" stroke-linecap="round" opacity="0.9"/>
    <line x1="362" y1="310" x2="256" y2="390" stroke="white" stroke-width="28" stroke-linecap="round" opacity="0.9"/>
    <line x1="150" y1="310" x2="362" y2="310" stroke="white" stroke-width="28" stroke-linecap="round" opacity="0.9"/>
    
    <!-- Nœud gauche (HRIS) -->
    <circle cx="150" cy="310" r="50" fill="white"/>
    
    <!-- Nœud droit (Business) -->
    <circle cx="362" cy="310" r="50" fill="white"/>
    
    <!-- Nœud haut (Strategy) - légèrement plus grand pour l'emphase -->
    <circle cx="256" cy="150" r="56" fill="white"/>
    
    <!-- Nœud bas (Integration) -->
    <circle cx="256" cy="390" r="50" fill="white"/>
    
    <!-- Points centraux subtils pour plus de profondeur -->
    <circle cx="150" cy="310" r="16" fill="#2563eb" opacity="0.3"/>
    <circle cx="362" cy="310" r="16" fill="#2563eb" opacity="0.3"/>
    <circle cx="256" cy="150" r="18" fill="#2563eb" opacity="0.3"/>
    <circle cx="256" cy="390" r="16" fill="#2563eb" opacity="0.3"/>
  </g>
</svg>
